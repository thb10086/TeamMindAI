name: teammind

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: teammind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: teammind
      POSTGRES_PASSWORD: teammind
      POSTGRES_DB: teammind
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teammind -d teammind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: teammind-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: teammind-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: teammind
      MINIO_ROOT_PASSWORD: teammind123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 自动创建 bucket（一次性任务）
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 teammind teammind123) do echo 'wait minio...'; sleep 2; done;
      mc mb --ignore-existing local/teammind;
      mc anonymous set download local/teammind;
      echo 'minio bucket ready';
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
